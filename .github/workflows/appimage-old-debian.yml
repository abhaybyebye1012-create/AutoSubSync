name: Build AppImage (Old Debian Compatible)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git wget curl file \
            desktop-file-utils libfile-mimeinfo-perl \
            pkg-config libfuse-dev libcairo2-dev \
            libglib2.0-dev libc6-dev patchelf \
            appstream appstream-util

      - name: Create Python virtual environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install -e ".[dev]"

      - name: Ensure FFmpeg is downloaded
        run: |
          source venv/bin/activate
          if [ ! -f "main/resources/ffmpeg-bin/ffmpeg" ]; then
            python3 main/resources/ffmpeg_download.py
          fi

      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          pyinstaller --clean -y --dist ./dist "build.spec"

      - name: Create AppDir structure (minimal bundling)
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR"
          
          [ -d "dist/AutoSubSync" ] || { echo "ERROR: dist/AutoSubSync not found"; exit 1; }
          cp -r dist/AutoSubSync/* "$APPDIR/"
          
          # Create minimal lib directory for non-conflicting libraries only
          mkdir -p "$APPDIR/lib"
          
          # Only bundle Qt6 plugins, NOT system GLIBC or conflicting libs
          # Let the system provide GLIBC and core libraries
          echo "AppDir structure created - minimal bundling to avoid GLIBC conflicts"

      - name: Create AppRun script (use system libraries)
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          
          # Minimal LD_LIBRARY_PATH - let system provide GLIBC and core libs
          # Only add bundled Qt and app-specific libraries
          export LD_LIBRARY_PATH="${HERE}:${HERE}/lib:${LD_LIBRARY_PATH}"
          
          # Qt configuration
          export QT_QPA_PLATFORM_PLUGIN_PATH="${HERE}/plugins:${QT_QPA_PLATFORM_PLUGIN_PATH}"
          export QT_QPA_FONTDIR="${HERE}/fonts"
          
          # XDG configuration
          export XDG_DATA_DIRS="${HERE}/share:${XDG_DATA_DIRS}"
          export XDG_CONFIG_DIRS="${HERE}/etc:${XDG_CONFIG_DIRS}"
          
          # FFmpeg path
          export PATH="${HERE}:${PATH}"
          
          # Disable AVX512 for older CPU compatibility
          export GLIBC_TUNABLES=glibc.cpu.hwcaps=-AVX512F,-AVX512CD,-AVX512_SKL,-AVX512_CLX,-AVX512_CNL,-AVX512_ICL
          
          exec "${HERE}/AutoSubSync" "$@"
          EOF
          
          chmod +x "$APPDIR/AppRun"
          echo "AppRun script created with system GLIBC support"

      - name: Create .desktop file
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          VERSION=$(cat main/VERSION)
          
          cat > "$APPDIR/AutoSubSync.desktop" << EOF
          [Desktop Entry]
          Version=1.0
          Name=AutoSubSync
          GenericName=Subtitle Synchronization Tool
          Exec=AppRun %f
          Icon=autosubsync
          Type=Application
          Categories=AudioVideo;Video;Utility;
          Comment=Automatic subtitle synchronization tool
          Terminal=false
          StartupWMClass=AutoSubSync
          X-AppImage-Version=${VERSION}
          Keywords=subtitle;sync;synchronization;video;ffmpeg;
          EOF

      - name: Copy AppStream metadata
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          mkdir -p "$APPDIR/usr/share/metainfo"
          cp "main/assets/com.github.denizsafak.AutoSubSync.appdata.xml" \
             "$APPDIR/usr/share/metainfo/"
          echo "AppStream metadata copied"

      - name: Copy icon
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          
          for path in "main/assets/icon.png" "main/resources/icon.png" "main/icon.png"; do
            if [ -f "$path" ]; then
              cp "$path" "$APPDIR/autosubsync.png"
              ln -sf autosubsync.png "$APPDIR/.DirIcon" 2>/dev/null || true
              echo "Icon copied from $path"
              exit 0
            fi
          done
          
          echo "Warning: Icon not found"

      - name: Download appimagetool
        run: |
          mkdir -p build_tools
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O build_tools/appimagetool.AppImage
          chmod +x build_tools/appimagetool.AppImage
          echo "appimagetool downloaded"

      - name: Build AppImage
        run: |
          export ARCH=x86_64
          APPDIR="$(cd dist/AutoSubSync.AppDir && pwd)"
          
          echo "Building AppImage..."
          ./build_tools/appimagetool.AppImage \
            --appimage-extract-and-run \
            "$APPDIR" \
            "AutoSubSync-linux-x86_64.AppImage"
          
          if [ ! -f "AutoSubSync-linux-x86_64.AppImage" ]; then
            echo "ERROR: AppImage not created"
            exit 1
          fi
          
          ls -lh AutoSubSync-linux-x86_64.AppImage
          echo "✅ AppImage created successfully"

      - name: Validate AppStream metadata
        run: |
          APPIMAGE="AutoSubSync-linux-x86_64.AppImage"
          chmod +x "$APPIMAGE"
          
          echo "Extracting AppImage to validate metadata..."
          ./$APPIMAGE --appimage-extract > /dev/null 2>&1 || true
          
          if [ -f "squashfs-root/usr/share/metainfo/com.github.denizsafak.AutoSubSync.appdata.xml" ]; then
            echo "✅ AppStream metadata found in AppImage"
            appstreamcli validate --no-color squashfs-root/usr/share/metainfo/com.github.denizsafak.AutoSubSync.appdata.xml || echo "Note: Some validation warnings may be acceptable"
          else
            echo "⚠️  AppStream metadata not found in AppImage"
          fi

      - name: Test AppImage compatibility
        run: |
          APPIMAGE="AutoSubSync-linux-x86_64.AppImage"
          chmod +x "$APPIMAGE"
          
          echo "=== AppImage Information ==="
          file "$APPIMAGE"
          ldd "$APPIMAGE" 2>/dev/null || true
          
          echo ""
          echo "=== Testing AppImage extraction ==="
          ./$APPIMAGE --appimage-extract > /dev/null 2>&1 || true
          
          if [ -d "squashfs-root" ]; then
            echo "✅ AppImage structure valid"
            echo ""
            echo "=== Contents ==="
            ls -la squashfs-root/ | grep -E "^d|AutoSubSync|AppRun"
            
            echo ""
            echo "=== Checking for conflicting libraries ==="
            if [ -f "squashfs-root/lib/libm.so.6" ] || [ -f "squashfs-root/lib/libc.so.6" ]; then
              echo "⚠️  WARNING: System GLIBC libraries found in bundle (this may cause version conflicts)"
              echo "These should come from the system, not the AppImage"
            else
              echo "✅ No conflicting GLIBC libraries bundled"
            fi
          fi
          
          rm -rf squashfs-root

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-linux-x86_64
          path: 'AutoSubSync-linux-*.AppImage'
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: 'AutoSubSync-linux-*.AppImage'
          draft: false
          prerelease: false
          body: |
            # AutoSubSync AppImage Release
            
            ## System Requirements
            - **Linux x86_64** systems with GLIBC 2.17 or newer
            - **Debian 7+** (Wheezy, Jessie, Stretch, Buster, Bullseye, Bookworm)
            - **Ubuntu 14.04+** (Trusty, Xenial, Bionic, Focal, Jammy, etc.)
            - **Other Linux distributions** with compatible GLIBC
            
            ## Installation
            
            ```bash
            chmod +x AutoSubSync-linux-x86_64.AppImage
            ./AutoSubSync-linux-x86_64.AppImage
            ```
            
            Or copy to your PATH:
            ```bash
            sudo cp AutoSubSync-linux-x86_64.AppImage /usr/local/bin/autosubsync
            sudo chmod +x /usr/local/bin/autosubsync
            autosubsync  # Run from anywhere
            ```
            
            ## Features
            - ✅ Works on old Debian and Ubuntu systems
            - ✅ Uses system libraries (no GLIBC version conflicts)
            - ✅ Supports ffsubsync, autosubsync, and alass
            - ✅ Batch processing and manual synchronization
            - ✅ Multiple subtitle formats supported
            
            ## Troubleshooting
            
            If you get permission errors:
            ```bash
            chmod +x AutoSubSync-linux-x86_64.AppImage
            ```
            
            If AppImage won't run, check your GLIBC version:
            ```bash
            ldd --version | head -1
            ```
            
            ## Submit to AppImageHub
            
            This AppImage follows AppImage standards and can be submitted to https://github.com/AppImage/appimage.github.io
            
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf venv build_tools squashfs-root dist/AutoSubSync.AppDir
          echo "Cleanup completed"
