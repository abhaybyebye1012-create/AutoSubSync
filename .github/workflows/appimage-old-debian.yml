name: Build AppImage (Old Debian Compatible)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git wget curl file \
            desktop-file-utils libfile-mimeinfo-perl \
            pkg-config libfuse-dev libcairo2-dev \
            libglib2.0-dev libc6-dev patchelf \
            qt6-base-dev libqt6core6 libqt6gui6

      - name: Install system libraries for bundling
        run: |
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libxkbcommon-x11-0 libdbus-1-3 \
            libfontconfig1 libfreetype6 libharfbuzz0b libpng16-16 \
            libx11-6 libxcb1 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xkb1 libzstd1 zlib1g libssl3 libffi8 \
            libbz2-1.0 liblzma5 libsqlite3-0 libreadline8 \
            libncursesw6 libexpat1

      - name: Create Python virtual environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install -e ".[dev]"

      - name: Ensure FFmpeg is downloaded
        run: |
          source venv/bin/activate
          if [ ! -f "main/resources/ffmpeg-bin/ffmpeg" ]; then
            python3 main/resources/ffmpeg_download.py
          fi

      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          pyinstaller --clean -y --dist ./dist "build.spec"

      - name: Collect system libraries
        run: |
          mkdir -p deps/lib
          
          LIBS=(
            "libGL.so.1" "libxkbcommon.so.0" "libxkbcommon-x11.so.0"
            "libdbus-1.so.3" "libfontconfig.so.1" "libfreetype.so.6"
            "libharfbuzz.so.0" "libpng16.so.16" "libX11.so.6"
            "libxcb.so.1" "libxcb-icccm.so.4" "libxcb-image.so.0"
            "libxcb-keysyms.so.1" "libxcb-randr.so.0" "libxcb-render.so.0"
            "libxcb-shape.so.0" "libxcb-xfixes.so.0" "libxcb-xinerama.so.0"
            "libxcb-xkb.so.1" "libzstd.so.1" "libz.so.1" "libssl.so.3"
            "libcrypto.so.3" "libffi.so.8" "libbz2.so.1.0" "liblzma.so.5"
            "libsqlite3.so.0" "libreadline.so.8" "libncursesw.so.6" "libexpat.so.1"
          )
          
          for lib in "${LIBS[@]}"; do
            lib_path=$(ldconfig -p 2>/dev/null | grep " $lib$" | awk '{print $NF}' | head -1)
            [ -f "$lib_path" ] && cp "$lib_path" deps/lib/ 2>/dev/null
          done
          
          echo "Bundled $(ls -1 deps/lib/ | wc -l) libraries"

      - name: Create AppDir structure
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR"
          
          [ -d "dist/AutoSubSync" ] || { echo "ERROR: dist/AutoSubSync not found"; exit 1; }
          cp -r dist/AutoSubSync/* "$APPDIR/"
          
          mkdir -p "$APPDIR/lib"
          [ -d "deps/lib" ] && cp deps/lib/* "$APPDIR/lib/" 2>/dev/null || true

      - name: Create AppRun script
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          
          export LD_LIBRARY_PATH="${HERE}/lib:${HERE}:${LD_LIBRARY_PATH}"
          export QT_QPA_PLATFORM_PLUGIN_PATH="${HERE}/plugins:${QT_QPA_PLATFORM_PLUGIN_PATH}"
          export XDG_DATA_DIRS="${HERE}/share:${XDG_DATA_DIRS}"
          export GLIBC_TUNABLES=glibc.cpu.hwcaps=-AVX512F,-AVX512CD,-AVX512_SKL,-AVX512_CLX,-AVX512_CNL,-AVX512_ICL
          
          exec "${HERE}/AutoSubSync" "$@"
          EOF
          
          chmod +x "$APPDIR/AppRun"

      - name: Create .desktop file
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          VERSION=$(cat main/VERSION)
          
          cat > "$APPDIR/AutoSubSync.desktop" << EOF
          [Desktop Entry]
          Version=1.0
          Name=AutoSubSync
          GenericName=Subtitle Synchronization Tool
          Exec=AppRun %f
          Icon=autosubsync
          Type=Application
          Categories=AudioVideo;Video;Utility;
          Comment=Automatic subtitle synchronization tool
          Terminal=false
          StartupWMClass=AutoSubSync
          X-AppImage-Version=${VERSION}
          EOF

      - name: Copy icon
        run: |
          APPDIR="dist/AutoSubSync.AppDir"
          
          for path in "main/assets/icon.png" "main/resources/icon.png" "main/icon.png"; do
            if [ -f "$path" ]; then
              cp "$path" "$APPDIR/autosubsync.png"
              ln -sf autosubsync.png "$APPDIR/.DirIcon" 2>/dev/null || true
              exit 0
            fi
          done
          
          echo "Warning: Icon not found, using placeholder"

      - name: Download appimagetool
        run: |
          mkdir -p build_tools
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O build_tools/appimagetool.AppImage
          chmod +x build_tools/appimagetool.AppImage

      - name: Build AppImage
        run: |
          export ARCH=x86_64
          APPDIR="$(cd dist/AutoSubSync.AppDir && pwd)"
          VERSION=$(cat main/VERSION)
          
          ./build_tools/appimagetool.AppImage \
            --appimage-extract-and-run \
            "$APPDIR" \
            "AutoSubSync-linux-x86_64.AppImage"
          
          ls -lh AutoSubSync-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-linux-x86_64
          path: 'AutoSubSync-linux-*.AppImage'
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: 'AutoSubSync-linux-*.AppImage'
          body: |
            # AutoSubSync AppImage
            
            Compatible with Debian 7+ and Ubuntu 14.04+
            
            Usage:
            ```bash
            chmod +x AutoSubSync-linux-x86_64.AppImage
            ./AutoSubSync-linux-x86_64.AppImage
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf deps venv build_tools squashfs-root dist/AutoSubSync.AppDir
